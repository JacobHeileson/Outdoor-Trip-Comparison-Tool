<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compare Trips</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>

    <header>
        <h1>Outdoor Trip Comparison Tool</h1>

        <nav>
            <a href="index.html">Home</a>
            <a href="compare.html">Compare Trips</a>
            <a href="guide.html">Trip Guide</a>
        </nav>
    </header>

    <main>

        <section class="comparison-section">

            <h2>Compare Outdoor Trips</h2>

            <!-- User Input Form -->
            <div class="form-container">

                <label for="tripType">Trip Type:</label>
                <select id="tripType">
                    <option value="Camping">Camping</option>
                    <option value="Fishing">Fishing</option>
                    <option value="Hunting">Hunting</option>
                </select>

                <label for="groupSize">Group Size:</label>
                <input type="number" id="groupSize" min="1" value="2">

                <label for="tripLength">Trip Length (days):</label>
                <input type="number" id="tripLength" min="1" value="3">

                <label for="experience">Experience Level:</label>
                <select id="experience">
                    <option value="Beginner">Beginner</option>
                    <option value="Intermediate">Intermediate</option>
                    <option value="Advanced">Advanced</option>
                </select>

                <button id="compareButton">
                    Compare Trip
                </button>

            </div>

            <!-- Results Section -->
            <div id="results">

                <h3>Trip Results</h3>

                <div class="result-card">
                    <p><strong>Estimated Cost:</strong> <span id="costResult"></span></p>
                    <p><strong>Difficulty:</strong> <span id="difficultyResult"></span></p>
                    <p><strong>Recommended For:</strong> <span id="recommendedResult"></span></p>
                    <p><strong>Suggested Gear:</strong></p>
                    <ul id="gearResult"></ul>
                    <p><strong>Trip Description:</strong></p>
                    <p id="descriptionResult"></p>
                </div>

            </div>

        </section>

    </main>

    <!-- JavaScript -->
    <script src="js/script.js"></script>

</body>
</html>
